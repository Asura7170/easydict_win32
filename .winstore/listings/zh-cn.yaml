language: zh-cn
title: Easydict Windows 版
shortTitle: Easydict
sortTitle: Easydict
voiceTitle: 易词典
shortDescription: 轻松查词翻译
description: |-
  Easydict Windows 版是一款专为速度与功能而生的免费开源翻译工具——现已为 Copilot+ PC 提供设备端 Windows AI 翻译。

  - 多 AI 支持：OpenAI、Gemini、DeepSeek、Groq、智谱 AI 等，并支持设备端本地 AI，在 Copilot+ PC 和任何配备 NPU 的设备上充分加速
  - 一站式翻译：Google、DeepL、必应等 20+ 服务
  - MDX 自定义词典，满足高级查词需求
  - OCR 截图翻译，基于 Windows 原生 OCR
  - PDF 与长文翻译，保留版面与公式
  - 原生 Windows 体验，选词即译

  Easydict 将设备端本地 AI、传统翻译引擎与现代云端 AI 模型整合为统一的工作流，从快速查词到全文翻译。

  本应用是热门 macOS Easydict 应用的 Windows 移植版，采用现代 .NET 和 WinUI 3 技术构建，提供原生 Windows 体验。

  支持 20+ 翻译服务，包括 Google 翻译、DeepL、必应、Linguee、彩云小译等。
  提供多种 LLM 的 AI 实时流式翻译。
  包含多种窗口模式、全局快捷键、剪贴板监听与系统托盘集成。
  同时支持文字转语音、深色模式和高 DPI 显示。

  Easydict 包含 AI 生成的翻译和语法纠错功能，AI 输出可能存在差异，请用户自行审阅。

  注意：部分翻译服务可能因区域限制、网络环境或需要 API 密钥等原因无法使用。
features:
- 设备端本地 AI 翻译，在 Copilot+ PC 和任何配备 NPU 的设备上充分加速
- 20+ 翻译服务，包括 Google、必应、DeepL、OpenAI、Gemini、DeepSeek 和火山翻译
- AI 服务实时流式翻译
- 'OCR 截图翻译：类似 Snipaste 的截图体验，选择屏幕区域，OCR 识别文字并即时翻译，使用 Windows OCR API'
- '语法纠错：AI 智能语法纠错，详细解释错误原因'
- '长文档翻译：支持 PDF、纯文本和 Markdown 文件翻译，具备 ML 版面检测、公式保护、并行处理和双语导出功能'
- 'MDX 词典：导入 MDict (.mdx) 词典文件，支持离线查词和丰富的 HTML 渲染'
- 全局快捷键，从任意应用中即时翻译
- 划词翻译，选中文本点击浮动按钮即可翻译
- 系统托盘集成，支持后台运行
- 深色和浅色主题，跟随系统设置
- 文字转语音，朗读原文和译文
- 自定义 OpenAI 兼容服务支持
- 高 DPI 和多显示器支持
keywords:
- 翻译
- 词典
- 大语言模型
- 本地 AI
- for Copilot+ PC
- OCR
- 划词翻译
